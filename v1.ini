[custom]

enable_rule_generator=true
overwrite_original_rules=true

exclude=流量|剩余|到期|套餐|官网|最新网址|防失联|失联|公告|通知|客服|工单|订阅|Traffic|Remaining|Expire|Official|Website

ruleset=REJECT,[]GEOSITE,category-ads-all

ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker

ruleset=🌍 国家选择,[]GEOSITE,gfw
ruleset=🌍 国家选择,[]FINAL

custom_proxy_group=🌍 国家选择`select`[]🇭🇰 香港`[]🇹🇼 台湾`[]🇯🇵 日本`[]🇸🇬 新加坡`[]🇺🇸 美国`[]🇨🇦 加拿大`[]🌏 其他地区`[]🧭 手动选择`[]♻️ 全球自动`[]DIRECT

custom_proxy_group=🧭 手动选择`select`.*

custom_proxy_group=♻️ 全球自动`url-test`.*`https://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🇭🇰 香港`fallback`(?i)(🇭🇰|香港|HK|hongkong)`https://www.gstatic.com/generate_204`300,,50`[]♻️ 全球自动
custom_proxy_group=🇹🇼 台湾`fallback`(?i)(🇹🇼|台湾|TW|taiwan|taipei|hinet)`https://www.gstatic.com/generate_204`300,,50`[]♻️ 全球自动
custom_proxy_group=🇯🇵 日本`fallback`(?i)(🇯🇵|日本|JP|tokyo|osaka|japan)`https://www.gstatic.com/generate_204`300,,50`[]♻️ 全球自动
custom_proxy_group=🇸🇬 新加坡`fallback`(?i)(🇸🇬|新加坡|SG|singapore)`https://www.gstatic.com/generate_204`300,,50`[]♻️ 全球自动
custom_proxy_group=🇺🇸 美国`fallback`(?i)(🇺🇸|美国|US|united states|los angeles|san jose|seattle|new york)`https://www.gstatic.com/generate_204`300,,50`[]♻️ 全球自动
custom_proxy_group=🇨🇦 加拿大`fallback`(?i)(🇨🇦|加拿大|CA|canada|toronto|vancouver|montreal)`https://www.gstatic.com/generate_204`300,,50`[]♻️ 全球自动

custom_proxy_group=🌏 其他地区`fallback`(?i)^(?!.*(香港|HK|台湾|TW|日本|JP|新加坡|SG|美国|US|加拿大|CA)).*`https://www.gstatic.com/generate_204`300,,50`[]♻️ 全球自动
