[custom]

enable_rule_generator=true
overwrite_original_rules=true

exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Official|Website

; ========================
; 国内全部直连
; ========================

ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker

; 国外全部走国家选择
ruleset=🌍 国家选择,[]GEOSITE,gfw
ruleset=🌍 国家选择,[]FINAL

; ========================
; 唯一入口
; ========================

custom_proxy_group=🌍 国家选择`select`[]🇭🇰 香港`[]🇹🇼 台湾`[]🇯🇵 日本`[]🇸🇬 新加坡`[]🇺🇸 美国`[]🇨🇦 加拿大`[]🌏 其他地区`[]♻️ 全球自动`[]DIRECT

; ========================
; 全机场自动测速
; ========================

custom_proxy_group=♻️ 全球自动`url-test`.*`https://www.gstatic.com/generate_204`300,,50

; ========================
; 国家组（故障自动切换）
; fallback = 节点失效自动切换
; ========================

custom_proxy_group=🇭🇰 香港`fallback`(?i)(🇭🇰|香港|\bHK\b|hongkong)`https://www.gstatic.com/generate_204`300,,50`[]♻️ 全球自动

custom_proxy_group=🇹🇼 台湾`fallback`(?i)(🇹🇼|台湾|\bTW\b|taiwan|taipei|hinet)`https://www.gstatic.com/generate_204`300,,50`[]♻️ 全球自动

custom_proxy_group=🇯🇵 日本`fallback`(?i)(🇯🇵|日本|\bJP\b|tokyo|osaka|japan)`https://www.gstatic.com/generate_204`300,,50`[]♻️ 全球自动

custom_proxy_group=🇸🇬 新加坡`fallback`(?i)(🇸🇬|新加坡|\bSG\b|singapore)`https://www.gstatic.com/generate_204`300,,50`[]♻️ 全球自动

custom_proxy_group=🇺🇸 美国`fallback`(?i)(🇺🇸|美国|\bUS\b|united states|los angeles|san jose|seattle|new york)`https://www.gstatic.com/generate_204`300,,50`[]♻️ 全球自动

custom_proxy_group=🇨🇦 加拿大`fallback`(?i)(🇨🇦|加拿大|\bCA\b|canada|toronto|vancouver|montreal)`https://www.gstatic.com/generate_204`300,,50`[]♻️ 全球自动

custom_proxy_group=🌏 其他地区`fallback`(?i)^(?!.*(🇭🇰|香港|\bHK\b|hongkong|🇹🇼|台湾|\bTW\b|taiwan|taipei|hinet|🇯🇵|日本|\bJP\b|tokyo|osaka|japan|🇸🇬|新加坡|\bSG\b|singapore|🇺🇸|美国|\bUS\b|united states|los angeles|san jose|seattle|new york|🇨🇦|加拿大|\bCA\b|canada|toronto|vancouver|montreal)).*`https://www.gstatic.com/generate_204`300,,50`[]♻️ 全球自动

; ========================
; 维护入口
; ========================

custom_proxy_group=🧭 手动选择`select`.*
custom_proxy_group=🐟 漏网之鱼`select`[]🌍 国家选择`[]♻️ 全球自动`[]DIRECT
